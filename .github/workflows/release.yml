name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + musl target
        run: |
          rustup update stable
          rustup target add x86_64-unknown-linux-musl

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/bdd dist/bdd
          chmod +x dist/bdd

      - name: Publish rolling 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: dist/bdd
          fail_on_unmatched_files: true

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      - name: Build Pages site (installer served at /bdd/)
        run: |
          mkdir -p site
          cp install.sh site/index.html
          cp install.sh site/install.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
