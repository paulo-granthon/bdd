name: deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "EX0*/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "install.sh"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma execução por vez; deploy do Pages é atômico (o site velho continua no ar
# até o novo ficar pronto, então a URL nunca cai durante o redeploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + musl target
        run: |
          rustup update stable
          rustup target add x86_64-unknown-linux-musl

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Assemble Pages site
        run: |
          mkdir -p site
          # instalador servido na raiz: curl .../bdd devolve o install.sh
          cp install.sh site/index.html
          cp install.sh site/install.sh
          # binário servido em /bdd/bin (o instalador e o injetor baixam daqui)
          cp target/x86_64-unknown-linux-musl/release/bdd site/bin

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
